# Rule 1 — Proxy/Web Gateway: domain-based detection (highest confidence)
title: Phishing a-gratis.uk — Domain Access via Proxy
id: 7f3c2a1b-4d8e-4f6a-9b2c-1e5f8a3d7c09
status: stable
description: Detects HTTP access to any subdomain of the a-gratis.uk phishing network via web proxy logs.
author: rwx4m
date: 2026/05/16
references:
  - https://sudo-rwx4m.my.id/projects/TI-Report_Phishing-Network_a-gratis-uk
tags:
  - attack.initial_access
  - attack.t1566.002
logsource:
  category: proxy
  product: web_proxy
detection:
  selection:
    c-uri-host|endswith: 'a-gratis.uk'
  condition: selection
falsepositives:
  - None expected — domain has no known legitimate use
level: high
fields:
  - c-uri-host
  - c-ip
  - cs-username
  - cs-User-Agent

