# Rule 4 — Network: Cloudflare proxy IP with phishing host header
title: Phishing a-gratis.uk — HTTP Request to Cloudflare with Phishing Host Header
id: 0c6f5d4e-7a1b-4c9d-0e3f-4b8a1d6e0f03
status: stable
description: |
  Detects HTTP/HTTPS connections to Cloudflare proxy IPs (104.21.43.223,
  172.67.186.183) with a-gratis.uk in the Host header. IPs confirmed via
  DNS resolution on 2026-05-16.
  NOTE: These IPs are Cloudflare anycast — do NOT block them at firewall level.
  Use domain-based blocking instead. This rule is for detection/alerting only.
author: rwx4m
date: 2026/05/16
references:
  - https://sudo-rwx4m.my.id/projects/TI-Report_Phishing-Network_a-gratis-uk
tags:
  - attack.initial_access
  - attack.t1566.002
logsource:
  category: network_connection
  product: zeek
detection:
  selection_ip:
    dst_ip:
      - '104.21.43.223'
      - '172.67.186.183'
  selection_host:
    http.host|endswith: 'a-gratis.uk'
  condition: selection_ip and selection_host
falsepositives:
  - Other sites hosted on same Cloudflare IPs without a-gratis.uk host header
level: medium
fields:
  - src_ip
  - dst_ip
  - http.host
  - http.uri
